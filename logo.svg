  <!-- Text portion "Equus" and "Chain" -->
  <text x="65" y="38" font-family="'Cormorant SC', 'Cormorant Garamond', 'Times New Roman', serif" font-size="24" font-weight="300" fill="#F2EBD9" letter-spacing="0.22em">Equus<tspan fill="url(#gold-grad-logo)">Chain</tspan></text>
